<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const ADMIN_PASSWORD = "masters2026";
const PAR = 72;
const MC_PENALTY_STROKES = 80;
const MC_PENALTY_TO_PAR = MC_PENALTY_STROKES - PAR;
const DROPS = 2;
const PICKS_PER_PERSON = 8;
const ESPN_API = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard";
const STORAGE_KEY = "masters-pool-participants-2026";

function fmt(n) {
  if (n === null || n === undefined) return "-";
  if (n === 0) return "E";
  return n > 0 ? `+${n}` : `${n}`;
}
function cls(n) {
  if (n === null || n === undefined) return "even";
  if (n < 0) return "under";
  if (n > 0) return "over";
  return "even";
}
function norm(s) { return (s || "").trim().toLowerCase(); }

function parseESPN(data) {
  const players = {};
  const events = data?.events || [];
  if (!events.length) return players;

  // Find the Masters event specifically, fall back to first event
  const event = events.find(e => e.name?.toLowerCase().includes("masters")) || events[0];
  const comps = event?.competitions?.[0]?.competitors || [];

  comps.forEach(comp => {
    const athlete = comp.athlete || {};
    const name = athlete.displayName || "";
    if (!name) return;

    const statusType = comp.status?.type || {};
    const statusName = (statusType.name || "").toLowerCase();
    const shortDetail = statusType.shortDetail || "";
    const isMC = statusName === "cut" || shortDetail.toUpperCase() === "CUT";
    const isWD = statusName === "wd" || statusName === "withdrawn";
    const isCompleted = !!statusType.completed;
    const currentPeriod = comp.status?.period || 0; // current round (1-4)

    // linescores: one entry per completed round, value = total strokes that round
    const linescores = comp.linescores || [];
    const roundStrokes = [null, null, null, null];
    linescores.forEach((ls) => {
      const round = (ls.period || 0) - 1; // period 1 = R1, index 0
      if (round >= 0 && round < 4 && ls.value > 0) {
        roundStrokes[round] = Number(ls.value);
      }
    });

    // For MC/WD, fill unplayed rounds with penalty
    const roundsTP = roundStrokes.map((s, i) => {
      if (s !== null) return s - PAR;
      if (isMC || isWD) return MC_PENALTY_TO_PAR;
      return null;
    });

    // comp.score IS the cumulative to-par string ESPN shows on their leaderboard
    // e.g. "-4", "+2", "E", "-" (pre-round). Trust it directly.
    let topar = 0;
    const scoreStr = String(comp.score ?? "").trim();
    if (isMC || isWD) {
      // For MC/WD sum the penalized rounds
      topar = roundsTP.reduce((a, b) => a + (b ?? 0), 0);
    } else if (scoreStr === "E" || scoreStr === "0") {
      topar = 0;
    } else if (scoreStr !== "" && scoreStr !== "-") {
      const parsed = Number(scoreStr);
      topar = isNaN(parsed) ? 0 : parsed;
    } else {
      topar = 0; // pre-round
    }

    // Tee time: ESPN puts it in status.teeTime or shortDetail before play starts
    let teeTime = comp.status?.teeTime || null;
    if (!teeTime && /\d+:\d+\s*(AM|PM)/i.test(shortDetail)) {
      teeTime = shortDetail;
    }

    // Thru display
    let thru;
    if (isMC) thru = "CUT";
    else if (isWD) thru = "WD";
    else if (isCompleted) thru = "F";
    else if (currentPeriod > 0 && shortDetail && !/AM|PM/i.test(shortDetail) && shortDetail !== "-") {
      // shortDetail during play is like "Thru 4" or hole number
      thru = shortDetail;
    } else if (teeTime) {
      thru = teeTime;
    } else {
      thru = shortDetail || "-";
    }

    players[norm(name)] = {
      name,
      pos: comp.status?.type?.shortDetail || "-",
      topar,
      rounds: roundsTP,
      strokes: roundStrokes,
      thru,
      status: isMC ? "cut" : isWD ? "wd" : "active",
      teeTime,
    };
  });
  return players;
}

function computePickScore(name, playerMap) {
  const p = playerMap[norm(name)];
  if (!p) return { name, rounds: [MC_PENALTY_TO_PAR,MC_PENALTY_TO_PAR,MC_PENALTY_TO_PAR,MC_PENALTY_TO_PAR], total: MC_PENALTY_TO_PAR*4, status: "unknown" };
  const total = p.rounds.filter(r => r !== null).reduce((a, b) => a + b, 0);
  return { name, rounds: p.rounds, total, status: p.status, thru: p.thru, pos: p.pos };
}

function computeParticipantScore(participant, playerMap) {
  const pickScores = participant.picks.filter(Boolean).map(name => computePickScore(name, playerMap));
  const sorted = [...pickScores].sort((a, b) => b.total - a.total);
  const droppedNames = new Set(sorted.slice(0, DROPS).map(p => p.name));
  const grandTotal = pickScores.filter(p => !droppedNames.has(p.name)).reduce((a, p) => a + p.total, 0);
  return { pickScores, droppedNames, grandTotal };
}

async function parsePicksExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array", cellFormula: true, cellNF: false, raw: false });
        const wsName = wb.SheetNames.includes("My Picks") ? "My Picks" : wb.SheetNames[0];
        const ws = wb.Sheets[wsName];
        if (!ws) { reject(new Error("No 'My Picks' sheet found.")); return; }

        function getCellVal(addr) {
          const cell = ws[addr];
          if (!cell) return "";
          const v = cell.v !== undefined && cell.v !== null ? String(cell.v).trim() : "";
          const w = cell.w !== undefined && cell.w !== null ? String(cell.w).trim() : "";
          return v || w || "";
        }

        const participantName = getCellVal("C5");
        if (!participantName) { reject(new Error("No name in YOUR NAME cell.")); return; }

        const picks = [];
        const pickAddrs = ["C8","C9","C10","C11","C12","C13","C14","C15"];
        for (const addr of pickAddrs) {
          const val = getCellVal(addr);
          if (val) picks.push(val);
        }
        const tiebreaker = getCellVal("C16") || null;
        resolve({ name: participantName, picks: [...picks, ...Array(PICKS_PER_PERSON).fill("")].slice(0, PICKS_PER_PERSON), tiebreaker });
      } catch (err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

const JSONBIN_BIN_ID = "69d67dd6aaba882197d8b175";

async function loadParticipants() {
  try {
    const res = await fetch(JSONBIN_URL + "/latest", {
      headers: { "X-Master-Key": JSONBIN_KEY, "X-Bin-Meta": "false" }
    });
    if (!res.ok) { const txt = await res.text(); console.error("Load error:", txt); return []; }
    const json = await res.json();
    return json.record?.participants || json.participants || [];
  } catch (e) { console.error("Load exception:", e); return []; }
}

async function saveParticipants(data) {
  try {
    const res = await fetch(JSONBIN_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY, "X-Bin-Meta": "false" },
      body: JSON.stringify({ participants: data })
    });
    if (!res.ok) { const txt = await res.text(); console.error("Save error:", txt); }
  } catch (e) { console.error("Save exception:", e); }
}

function MastersPool() {
  const [tab, setTab] = useState("pool");
  const [participants, setParticipants] = useState([]);
  const [participantsLoading, setParticipantsLoading] = useState(true);
  const [playerMap, setPlayerMap] = useState({});
  const [rawData, setRawData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [expandedRow, setExpandedRow] = useState(null);
  const [copiedName, setCopiedName] = useState(null);
  const [fieldSearch, setFieldSearch] = useState("");
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [adminPw, setAdminPw] = useState("");
  const [adminErr, setAdminErr] = useState("");
  const [editP, setEditP] = useState([]);
  const [newName, setNewName] = useState("");
  const [saveMsg, setSaveMsg] = useState("");
  const [uploadResult, setUploadResult] = useState(null);
  const [uploadErr, setUploadErr] = useState("");
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);

  const fetchScores = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      // Try direct Masters event first, fall back to scoreboard (which finds by name)
      let data;
      try {
        const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard?dates=20260409");
        if (res.ok) data = await res.json();
      } catch(e) {}
      if (!data?.events?.length || !data.events.find(e => e.name?.toLowerCase().includes("masters"))) {
        const res = await fetch(ESPN_API);
        if (!res.ok) throw new Error(`ESPN API returned ${res.status}`);
        data = await res.json();
      }
      setRawData(data); setPlayerMap(parseESPN(data)); setLastUpdated(new Date());
    } catch (e) { setError(`Could not load live scores: ${e.message}`); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { fetchScores(); }, [fetchScores]);

  useEffect(() => {
    (async () => {
      setParticipantsLoading(true);
      const data = await loadParticipants();
      setParticipants(data);
      setParticipantsLoading(false);
    })();
  }, []);

  const poolRows = participants.map(p => ({ ...p, ...computeParticipantScore(p, playerMap) })).sort((a, b) => a.grandTotal - b.grandTotal);
  const allPlayers = Object.values(playerMap).sort((a, b) => a.topar - b.topar);

  // Build a map of normalized player name -> pick count across all participants
  const pickCountMap = {};
  participants.forEach(p => {
    p.picks.filter(Boolean).forEach(pick => {
      const key = norm(pick);
      pickCountMap[key] = (pickCountMap[key] || 0) + 1;
    });
  });

  function copyName(name) {
    navigator.clipboard.writeText(name).catch(() => {});
    setCopiedName(name); setTimeout(() => setCopiedName(null), 1500);
  }

  function handleLogin() {
    if (adminPw === ADMIN_PASSWORD) { setAdminAuthed(true); setAdminErr(""); setEditP(JSON.parse(JSON.stringify(participants))); }
    else setAdminErr("Incorrect password.");
  }

  async function saveAll() {
    const cleaned = editP.map(p => ({ ...p, picks: p.picks.filter(x => x?.trim()) }));
    setSaveMsg("Saving...");
    await saveParticipants(cleaned);
    const confirmed = await loadParticipants();
    setParticipants(confirmed);
    setEditP(JSON.parse(JSON.stringify(confirmed)));
    setSaveMsg("Saved! (" + confirmed.length + " participants)");
    setTimeout(() => setSaveMsg(""), 4000);
  }

  function addParticipant() {
    if (!newName.trim()) return;
    setEditP(prev => [...prev, { name: newName.trim(), picks: Array(PICKS_PER_PERSON).fill(""), tiebreaker: null }]);
    setNewName("");
  }

  function removePart(idx) { setEditP(prev => prev.filter((_, i) => i !== idx)); }

  function updatePick(pIdx, pickIdx, val) {
    setEditP(prev => prev.map((p, i) => {
      if (i !== pIdx) return p;
      const picks = [...p.picks]; picks[pickIdx] = val; return { ...p, picks };
    }));
  }

  async function handleFile(file) {
    setUploadErr(""); setUploadResult(null);
    if (!file) return;
    try {
      const result = await parsePicksExcel(file);
      const existsIdx = editP.findIndex(p => norm(p.name) === norm(result.name));
      if (existsIdx >= 0) {
        setEditP(prev => prev.map((p, i) => i === existsIdx ? { ...p, picks: result.picks, tiebreaker: result.tiebreaker } : p));
        setUploadResult({ ...result, action: "updated" });
      } else {
        setEditP(prev => [...prev, result]);
        setUploadResult({ ...result, action: "added" });
      }
    } catch (e) { setUploadErr(e.message || "Could not read file."); }
  }

  const filteredField = allPlayers.filter(p => !fieldSearch || norm(p.name).includes(norm(fieldSearch)));
  const tournamentName = (rawData?.events?.find(e => e.name?.toLowerCase().includes("masters")) || rawData?.events?.[0])?.name || "2026 Masters Tournament";

  return (
    <div className="app">
      <div className="header">
        <div className="header-flag">⛳ Augusta National · April 2026</div>
        <h1>Masters <span>Pool</span></h1>
        <div className="header-sub">Pick 8 · Worst 2 Dropped · MC = 80 strokes (+8) per unplayed round</div>
        {lastUpdated && <div className="last-updated">Scores from ESPN · Updated {lastUpdated.toLocaleTimeString()}</div>}
      </div>

      <div className="tabs">
        {[{key:"pool",label:"Pool Standings"},{key:"live",label:"Live Leaderboard"},{key:"audit",label:"Raw Scores ✓"},{key:"field",label:"Field & Names"},{key:"rules",label:"Rules"},{key:"admin",label:"Admin"}].map(t => (
          <button key={t.key} className={`tab-btn${tab===t.key?" active":""}`} onClick={() => setTab(t.key)}>{t.label}</button>
        ))}
      </div>

      {tab === "pool" && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">Pool Standings</span>
            <button className="refresh-btn" onClick={fetchScores} disabled={loading}><span className={loading?"spin":""}>↻</span>{loading?"Updating…":"Refresh"}</button>
          </div>
          {participantsLoading ? <div className="loading"><span className="ico">⛳</span>Loading pool data…</div>
          : participants.length === 0 ? <div className="loading">No participants yet — add them in Admin.</div>
          : loading && !Object.keys(playerMap).length ? <div className="loading"><span className="ico">⛳</span>Loading live scores…</div>
          : (
            <table className="pool-table">
              <thead><tr><th>#</th><th>Participant</th><th style={{textAlign:"right",paddingRight:14}}>Total</th></tr></thead>
              <tbody>
                {poolRows.map((row, i) => {
                  const isExp = expandedRow === row.name;
                  const pc = i===0?"p1":i===1?"p2":i===2?"p3":"";
                  return (
                    <React.Fragment key={row.name}>
                      <tr className="participant-row" onClick={() => setExpandedRow(isExp ? null : row.name)}>
                        <td colSpan={3}>
                          <div className="participant-summary">
                            <div className={`pos-num ${pc}`}>{i+1}</div>
                            <div>
                              <div className="p-name">{row.name}{row.tiebreaker && <span style={{fontSize:11,fontWeight:400,color:"rgba(201,168,76,0.7)",marginLeft:8}}>TB: {row.tiebreaker}</span>}</div>
                              <div className="p-preview">{row.picks.filter(Boolean).slice(0,4).join(", ")}{row.picks.filter(Boolean).length>4?"…":""}</div>
                            </div>
                            <div className={`p-total ${cls(row.grandTotal)}`}>{fmt(row.grandTotal)}</div>
                          </div>
                        </td>
                      </tr>
                      {isExp && (
                        <tr><td colSpan={3}>
                          <div className="picks-detail"><div className="picks-inner">
                            <div className="picks-grid">
                              {row.pickScores.map(ps => {
                                const dropped = row.droppedNames.has(ps.name);
                                const isMC = ps.status==="cut"||ps.status==="wd";
                                const rStr = ps.rounds.map((r,ri) => r!==null?`R${ri+1}:${fmt(r)}`:`R${ri+1}:-`).join(" ");
                                return (
                                  <div key={ps.name} className={`pick-card${dropped?" dropped":""}${isMC?" mc":""}`}>
                                    <div>
                                      <div className="pick-name">{ps.name}</div>
                                      <div className="pick-detail">{isMC?"MC/WD":ps.status==="unknown"?"?":ps.thru?`Thru ${ps.thru}`:""}</div>
                                      <div className="pick-rounds">{rStr}</div>
                                    </div>
                                    <div>
                                      <div className={`pick-score ${isMC?"mc":cls(ps.total)}`}>{fmt(ps.total)}</div>
                                      {dropped && <div className="drop-label">dropped</div>}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                            {row.tiebreaker && <div className="tb-line">Tiebreaker: {row.tiebreaker}</div>}
                          </div></div>
                        </td></tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}

      {tab === "live" && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">{tournamentName}</span>
            <button className="refresh-btn" onClick={fetchScores} disabled={loading}><span className={loading?"spin":""}>↻</span>{loading?"Updating…":"Refresh"}</button>
          </div>
          {loading && !allPlayers.length ? <div className="loading"><span className="ico">⛳</span>Fetching live scores from ESPN…</div>
          : error ? <div className="error-block">{error}</div>
          : !allPlayers.length ? <div className="loading">No scores yet. Tournament may not have started.</div>
          : (
            <table className="live-table">
              <thead><tr><th style={{width:50}}>Pos</th><th>Player</th><th className="r">Total</th><th className="r">R1</th><th className="r">R2</th><th className="r">R3</th><th className="r">R4</th><th className="r">Thru</th><th className="r">Tee Time</th></tr></thead>
              <tbody>
                {allPlayers.map(p => (
                  <tr key={p.name} className={p.status==="cut"||p.status==="wd"?"cut-row":""}>
                    <td className="live-pos">{p.pos}</td>
                    <td><span className="live-name">{p.name}</span></td>
                    <td className="r"><span className={`score-pill ${cls(p.topar)}`}>{fmt(p.topar)}</span></td>
                    {p.strokes.map((s,i) => <td key={i} className="r" style={{color:"rgba(245,240,232,0.65)"}}>{s!==null ? s : "—"}</td>)}
                    <td className="r">
                      {p.status==="cut"?<span className="thru-badge cut">CUT</span>
                      :p.status==="wd"?<span className="thru-badge wd">WD</span>
                      :p.thru==="F"?<span className="thru-badge active">F</span>
                      :/^\d+$/.test(p.thru)?<span className="thru-badge active">{p.thru}</span>
                      :<span style={{fontSize:11,color:"rgba(245,240,232,0.5)"}}>{p.thru||"—"}</span>}
                    </td>
                    <td className="r" style={{fontSize:11,color:"rgba(245,240,232,0.5)"}}>{/\d+:\d+/.test(p.thru||"")?p.thru:p.teeTime||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {tab === "audit" && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">Raw Scores Audit</span>
            <button className="refresh-btn" onClick={fetchScores} disabled={loading}><span className={loading?"spin":""}>↻</span>{loading?"Updating…":"Refresh"}</button>
          </div>
          <div className="audit-info">
            Raw stroke counts from ESPN's API — exactly what is used for pool scoring.
            <strong style={{color:"var(--gold)",marginLeft:6}}>Gold badge = number of pool participants who picked that player.</strong>
            {" "}Cross-check against <a href="https://www.espn.com/golf/leaderboard" target="_blank" rel="noreferrer" style={{color:"var(--gold)"}}>ESPN</a> or <a href="https://www.masters.com/leaderboard" target="_blank" rel="noreferrer" style={{color:"var(--gold)"}}>Masters.com</a> anytime.
          </div>
          {!allPlayers.length ? <div className="loading">No data. Hit Refresh.</div> : (
            <table className="audit-table">
              <thead><tr><th style={{width:50}}>Pos</th><th>Player</th><th className="r">To Par</th><th className="r">R1</th><th className="r">R2</th><th className="r">R3</th><th className="r">R4</th><th className="r">Total Stk</th><th className="r">Thru</th></tr></thead>
              <tbody>
                {allPlayers.map(p => {
                  const pickCount = pickCountMap[norm(p.name)] || 0;
                  const isPicked = pickCount > 0;
                  const isMC = p.status==="cut"||p.status==="wd";
                  const totalStrokes = p.strokes.filter(s=>s!==null).reduce((a,b)=>a+b,0);
                  return (
                    <tr key={p.name} className={isPicked?"highlight":""}>
                      <td className="live-pos">{p.pos}</td>
                      <td>
                        {isPicked && (
                          <span className="pick-count-badge" title={`Picked by ${pickCount} participant${pickCount !== 1 ? "s" : ""}`}>
                            {pickCount}×
                          </span>
                        )}
                        {p.name}
                        {isMC && <span className="thru-badge cut" style={{marginLeft:6}}>MC</span>}
                      </td>
                      <td className="r"><span className={`score-pill ${cls(p.topar)}`}>{fmt(p.topar)}</span></td>
                      {p.strokes.map((s,i) => (
                        <td key={i} className="r">
                          {s!==null?<span>{s} <span style={{color:"rgba(245,240,232,0.35)",fontSize:10}}>({fmt(s-PAR)})</span></span>
                          :isMC?<span className="mc-pen">80* (+8)</span>:"—"}
                        </td>
                      ))}
                      <td className="r" style={{color:"var(--cream)"}}>{totalStrokes||"—"}</td>
                      <td className="r">
                        {p.status==="cut" ? <span className="thru-badge cut">CUT</span>
                        : p.status==="wd" ? <span className="thru-badge wd">WD</span>
                        : p.thru==="F" ? <span className="thru-badge active">F</span>
                        : /^\d+$/.test(p.thru||"") ? <span className="thru-badge active">{p.thru}</span>
                        : <span style={{fontSize:11,color:"rgba(245,240,232,0.5)"}}>{p.teeTime||"—"}</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}

      {tab === "field" && (
        <div className="card">
          <div className="card-header">
            <span className="card-title">Field & Names</span>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <input className="field-search" type="text" placeholder="Search…" value={fieldSearch} onChange={e=>setFieldSearch(e.target.value)}/>
              <button className="refresh-btn" onClick={fetchScores} disabled={loading}><span className={loading?"spin":""}>↻</span>{loading?"Loading…":"Refresh"}</button>
            </div>
          </div>
          <div style={{padding:"9px 13px",fontSize:12,color:"rgba(245,240,232,0.42)",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>Names pulled live from ESPN. Copy exact spelling into your picks.</div>
          {!allPlayers.length ? <div className="loading">No field data. Hit Refresh.</div> : (
            <table className="live-table">
              <thead><tr><th>Player</th><th className="r">Status</th><th style={{width:90,textAlign:"right",paddingRight:14}}></th></tr></thead>
              <tbody>
                {filteredField.map(p => (
                  <tr key={p.name}>
                    <td><span className="live-name">{p.name}</span></td>
                    <td className="r">{p.status==="cut"?<span className="thru-badge cut">MC</span>:p.status==="wd"?<span className="thru-badge wd">WD</span>:<span className="thru-badge active">In field</span>}</td>
                    <td style={{textAlign:"right",paddingRight:14}}>
                      <button className={`copy-btn${copiedName===p.name?" copied":""}`} onClick={() => copyName(p.name)}>{copiedName===p.name?"✓ Copied":"Copy"}</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}

      {tab === "rules" && (
        <div className="card">
          <div className="card-header"><span className="card-title">Pool Rules</span></div>
          <div className="rules-section">
            <h3>Format</h3>
            <p>Each participant selects <strong>8 golfers</strong> before the tournament. Scores tracked relative to par.</p>
            <h3>Scoring</h3>
            <ul>
              <li>Each participant's <strong>2 worst individual golfer scores are dropped</strong>.</li>
              <li>The remaining 6 scores are summed for the final total.</li>
              <li><strong>Lowest total wins.</strong></li>
            </ul>
            <h3>Missed Cut / Withdrawal</h3>
            <ul><li>MC or WD = <strong>80 strokes per unplayed round</strong>. Augusta is par 72, so 80 = <strong>+8 to par</strong> per round.</li></ul>
            <div className="example-box">Example — Player misses cut after R2:<br/>R1: 75 (+3)  R2: 74 (+2)  R3: 80 (+8)*  R4: 80 (+8)*<br/>Pool total = +3 +2 +8 +8 = <strong>+21</strong></div>
            <h3>Scoring Source</h3>
            <p>All scores pulled directly from <strong>ESPN's live API</strong>. Verify any score in the <strong>Raw Scores ✓</strong> tab.</p>
            <h3>Tiebreaker</h3>
            <p>Closest guess to the winning score to par. If still tied, prize is split.</p>
          </div>
        </div>
      )}

      {tab === "admin" && (
        <div className="card">
          <div className="card-header"><span className="card-title">Admin</span></div>
          <div className="admin-wrap">
            {!adminAuthed ? (
              <div className="admin-login">
                <h3>Admin Login</h3>
                <input type="password" placeholder="Password" value={adminPw} onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>
                <button className="btn" onClick={handleLogin}>Login</button>
                {adminErr && <div className="err">{adminErr}</div>}
              </div>
            ) : (
              <div>
                <div className={`upload-zone${dragOver?" over":""}`} onClick={() => fileRef.current?.click()}
                  onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
                  onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}>
                  <input ref={fileRef} type="file" accept=".xlsx" style={{display:"none"}} onChange={e=>{handleFile(e.target.files[0]);e.target.value="";}}/>
                  <div style={{fontSize:28,marginBottom:8}}>📥</div>
                  <h4>Drop participant's picks file here</h4>
                  <p>Or click to browse · Accepts Masters Pool picks template (.xlsx)</p>
                </div>
                {uploadErr && <div className="err" style={{marginBottom:12}}>⚠ {uploadErr}</div>}
                {uploadResult && (
                  <div className="upload-ok">
                    <h4>✓ {uploadResult.action==="updated"?"Updated":"Added"}: {uploadResult.name}</h4>
                    {uploadResult.picks.filter(Boolean).map((p,i) => <div key={i} className="upload-ok-row">Pick {i+1}: {p}</div>)}
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={{fontFamily:"'Playfair Display',serif",color:"var(--gold-light)",fontSize:16}}>Participants ({editP.length})</div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    {saveMsg && <span className={saveMsg.includes("fail")?"err":"ok"}>{saveMsg}</span>}
                    <button className="btn" onClick={saveAll}>Save All</button>
                  </div>
                </div>
                <div className="add-box">
                  <div style={{fontSize:11,color:"var(--gold)",fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Add Manually</div>
                  <div className="add-row">
                    <input type="text" placeholder="Name…" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addParticipant()}/>
                    <button className="btn" onClick={addParticipant}>Add</button>
                  </div>
                </div>
                {editP.map((p, pIdx) => (
                  <div key={pIdx} className="p-item">
                    <div className="p-item-head">
                      <div className="p-item-name">{p.name}{p.tiebreaker&&<span style={{fontSize:11,color:"var(--gold)",marginLeft:8,fontWeight:400}}>TB: {p.tiebreaker}</span>}</div>
                      <button className="btn danger sm" onClick={() => removePart(pIdx)}>Remove</button>
                    </div>
                    <div className="picks-inputs">
                      {Array(PICKS_PER_PERSON).fill(null).map((_,pickIdx) => (
                        <div key={pickIdx}>
                          <div className="pick-lbl">Pick {pickIdx+1}</div>
                          <input type="text" placeholder="Golfer name…" value={p.picks[pickIdx]||""} onChange={e=>updatePick(pIdx,pickIdx,e.target.value)}/>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                <div style={{marginTop:14,fontSize:11,color:"rgba(245,240,232,0.32)"}}>💡 Use Field & Names tab for exact golfer spellings. Hit Save All after changes.</div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MastersPool/>);
</script>
</body>
</html>
